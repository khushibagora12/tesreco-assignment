<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>View Mentors</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      }

      body {
        background: #f5f5f5;
        padding: 40px;
      }

      .container {
        max-width: 900px;
        margin: auto;
        background: white;
        padding: 30px;
        border-radius: 15px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
      }

      h1 {
        text-align: center;
        margin-bottom: 25px;
        color: #333;
      }

      table {
        width: 100%;
        border-collapse: collapse;
      }

      th {
        background: #10b981;
        color: white;
        padding: 12px;
      }

      td {
        padding: 12px;
        border-bottom: 1px solid #ddd;
        text-align: center;
      }

      tr:hover {
        background: #f9f9f9;
      }

      .loading {
        text-align: center;
        font-size: 18px;
      }

      .btn {
        display: inline-block;
        margin-top: 20px;
        padding: 12px 20px;
        background: #ff4fa0;
        color: white;
        text-decoration: none;
        border-radius: 8px;
      }
      .delete-btn {
        background: #ef4444;
        color: white;
        border: none;
        padding: 8px 14px;
        border-radius: 6px;
        cursor: pointer;
      }

      .delete-btn:hover {
        opacity: 0.9;
      }
      .dashboard-btn {
        position: fixed;
        top: 20px;
        left: 20px;
        padding: 10px 20px;
        background: transparent;
        color: rgb(80, 79, 79);
        text-decoration: none;
        border-radius: 8px;
        font-weight: bold;
        z-index: 1000;
      }
      .dashboard-btn:hover {
        border-radius: 8px;
        font-size: large;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Assigned Mentors</h1>
      <a href="/dashboard" class="dashboard-btn"> ← Dashboard </a>
      <p class="loading" id="loading">Loading mentor assignments...</p>

      <table id="mentorTable" style="display: none">
        <thead>
          <tr>
            <th>Mentor Name</th>
            <th>Assigned Domain</th>
            <th>Action</th>
          </tr>
        </thead>

        <tbody id="tableBody"></tbody>
      </table>

      <center>
        <a href="/assign_mentors" class="btn"> Assign New Mentor </a>
      </center>
    </div>

    <script>
      async function loadMentors() {
        try {
          const response = await fetch("/getMentors");
          const mentors = await response.json();

          document.getElementById("loading").style.display = "none";
          document.getElementById("mentorTable").style.display = "table";

          const tableBody = document.getElementById("tableBody");

          mentors.forEach((mentor) => {
            const row = `
                <tr>
                    <td>${mentor[2]}</td>
                    <td>${mentor[1]}</td>
                    <td>
                        <button
                            class="delete-btn"
                            onclick="deleteMentor(${mentor[0]})">
                            Delete
                        </button>
                    </td>
                </tr>
            `;

            tableBody.innerHTML += row;
          });
        } catch (error) {
          console.error(error);

          document.getElementById("loading").innerText =
            "Failed to load mentor assignments";
        }
      }
      async function deleteMentor(id) {
        const confirmDelete = confirm(
          "Are you sure you want to delete this mentor assignment?",
        );

        if (!confirmDelete) {
          return;
        }

        try {
          const response = await fetch(`/delete_mentor/${id}`, {
            method: "DELETE",
          });

          if (response.ok) {
            alert("Mentor assignment deleted");
            location.reload();
          } else {
            alert("Delete failed");
          }
        } catch (error) {
          console.error(error);
          alert("Something went wrong");
        }
      }
      loadMentors();
    </script>
  </body>
</html>
