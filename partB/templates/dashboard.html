<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TESRECO Internship Portal</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      }

      body {
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(135deg, #ff6b6b, #ff4fa0);
      }

      .container {
        width: 90%;
        max-width: 800px;
        background: white;
        padding: 40px;
        border-radius: 20px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
        text-align: center;
      }

      .logo {
        width: 100px;
        margin-bottom: 15px;
      }

      h1 {
        color: #333;
        margin-bottom: 10px;
      }

      p {
        color: #666;
        margin-bottom: 30px;
      }

      .buttons {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 20px;
      }

      .btn {
        display: block;
        padding: 18px;
        text-decoration: none;
        color: white;
        font-weight: bold;
        border-radius: 12px;
        transition: 0.3s;
      }

      .btn:hover {
        transform: translateY(-4px);
      }

      .register {
        background: #ff6b6b;
      }

      .view {
        background: #4f46e5;
      }

      .mentor {
        background: #10b981;
      }

      .about {
        background: #f59e0b;
      }
      .attendance {
        background: #14b8a6;
      }
      .view-mentor {
        background: #06b6d4;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <img
        src="{{ url_for('static', filename='logo.png') }}"
        alt="TESRECO Logo"
        class="logo"
      />

      <h1>TESRECO Internship Portal</h1>

      <p>Select an option to continue</p>

      <div class="buttons">
        <a href="/about" class="btn about"> About </a>
        <a href="/attendance" class="btn attendance"> Attendance </a>
        <a href="/intern_registration" class="btn register">
          Intern Registration
        </a>
        <a href="/view_interns" class="btn view"> View Interns </a>
        <a href="/assign_mentors" class="btn mentor"> Mentor Assignment </a>
        <a href="/view_mentors" class="btn view-mentor"> View Mentors </a>
      </div>
    </div>
  </body>
</html>
