<!doctype html>
<html>
  <head>
    <title>Assign Mentor</title>

    <style>
      body {
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(135deg, #ff6b6b, #ff4fa0);
        font-family: Segoe UI;
      }

      .container {
        width: 400px;
        background: white;
        padding: 30px;
        border-radius: 15px;
        box-shadow: 0 5px 20px rgba(0, 0, 0, 0.2);
      }

      h1 {
        text-align: center;
        margin-bottom: 20px;
      }

      label {
        display: block;
        margin-top: 15px;
        margin-bottom: 5px;
        font-weight: bold;
      }

      input,
      select {
        width: 100%;
        padding: 10px;
        border: 1px solid #ccc;
        border-radius: 8px;
      }

      button {
        width: 100%;
        margin-top: 20px;
        padding: 12px;
        border: none;
        border-radius: 8px;
        background: #ff4fa0;
        color: white;
        font-weight: bold;
        cursor: pointer;
      }
      .dashboard-btn {
        position: fixed;
        top: 20px;
        left: 20px;
        padding: 10px 20px;
        background: transparent;
        color: white;
        text-decoration: none;
        border-radius: 8px;
        font-weight: bold;
        z-index: 1000;
      }
      .dashboard-btn:hover {
        border-radius: 8px;
        font-size: large;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Assign Mentor</h1>
      <a href="/dashboard" class="dashboard-btn"> ← Dashboard </a>
      <form action="/assign_mentors" method="POST">
        <label>Mentor Name</label>
        <input
          type="text"
          name="mentor"
          placeholder="Enter Mentor Name"
          required
        />

        <label>Domain</label>
        <select name="domain" required>
          <option value="">Select Domain</option>
          <option>Web Development</option>
          <option>Python Development</option>
          <option>Data Science</option>
          <option>Artificial Intelligence</option>
          <option>UI/UX Design</option>
        </select>

        <button type="submit">Assign Mentor</button>
      </form>
    </div>
  </body>
</html>
