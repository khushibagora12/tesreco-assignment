<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Attendance Module</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Segoe UI", sans-serif;
      }

      body {
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(135deg, #ff6b6b, #ff4fa0);
      }

      .container {
        width: 90%;
        max-width: 500px;
        background: white;
        padding: 40px;
        border-radius: 20px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
      }

      h1 {
        text-align: center;
        margin-bottom: 25px;
        color: #333;
      }

      .form-group {
        margin-bottom: 20px;
      }

      label {
        display: block;
        margin-bottom: 8px;
        font-weight: 600;
      }

      input,
      select {
        width: 100%;
        padding: 12px;
        border: 1px solid #ddd;
        border-radius: 8px;
      }

      button {
        width: 100%;
        padding: 14px;
        border: none;
        border-radius: 8px;
        background: #ff4fa0;
        color: white;
        font-weight: bold;
        cursor: pointer;
      }

      button:hover {
        opacity: 0.9;
      }
      .dashboard-btn {
        position: fixed;
        top: 20px;
        left: 20px;
        padding: 10px 20px;
        background: transparent;
        color: white;
        text-decoration: none;
        border-radius: 8px;
        font-weight: bold;
        z-index: 1000;
      }
      .dashboard-btn:hover {
        border-radius: 8px;
        font-size: large;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Mark Attendance</h1>
      <a href="/dashboard" class="dashboard-btn"> ← Dashboard </a>
      <form action="/attendance" method="POST">
        <div class="form-group">
          <label>Intern Name</label>
          <input
            type="text"
            name="name"
            id="name"
            placeholder="Enter intern name"
            required
          />
        </div>

        <div class="form-group">
          <label>Status</label>
          <select name="status" id="status" required>
            <option value="">Select Status</option>
            <option value="Present">Present</option>
            <option value="Absent">Absent</option>
          </select>
        </div>

        <button type="submit">Save Attendance</button>
      </form>
    </div>
  </body>
</html>
