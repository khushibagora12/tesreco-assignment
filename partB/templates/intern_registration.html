<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Intern Registration</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      }

      body {
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(135deg, #ff6b6b, #ff4fa0);
      }

      .container {
        background: white;
        padding: 40px;
        border-radius: 20px;
        width: 90%;
        max-width: 500px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
      }

      .logo {
        display: block;
        width: 90px;
        margin: 0 auto 15px;
      }

      h1 {
        text-align: center;
        margin-bottom: 25px;
        color: #333;
      }

      .form-group {
        margin-bottom: 20px;
      }

      label {
        display: block;
        margin-bottom: 8px;
        font-weight: 600;
        color: #444;
      }

      input,
      select {
        width: 100%;
        padding: 12px;
        border: 1px solid #ccc;
        border-radius: 8px;
        font-size: 16px;
      }

      input:focus,
      select:focus {
        outline: none;
        border-color: #ff4fa0;
      }

      button {
        width: 100%;
        padding: 14px;
        border: none;
        border-radius: 8px;
        background: #ff4fa0;
        color: white;
        font-size: 16px;
        font-weight: bold;
        cursor: pointer;
        transition: 0.3s;
      }

      button:hover {
        background: #e63e8c;
      }
      .dashboard-btn {
        position: fixed;
        top: 20px;
        left: 20px;
        padding: 10px 20px;
        background: transparent;
        color: white;
        text-decoration: none;
        border-radius: 8px;
        font-weight: bold;
        z-index: 1000;
      }
      .dashboard-btn:hover {
        border-radius: 8px;
        font-size: large;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <img
        src="{{ url_for('static', filename='logo.png') }}"
        alt="TESRECO Logo"
        class="logo"
      />

      <h1>Intern Registration</h1>
      <a href="/dashboard" class="dashboard-btn"> ← Dashboard </a>
      <form action="/intern_registration" method="POST">
        <div class="form-group">
          <label for="name">Full Name</label>
          <input
            type="text"
            id="name"
            name="name"
            placeholder="Enter your full name"
            required
          />
        </div>

        <div class="form-group">
          <label for="email">Email Address</label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="Enter your email"
            required
          />
        </div>

        <div class="form-group">
          <label for="domain">Internship Domain</label>
          <select id="domain" name="domain" required>
            <option value="">Select Domain</option>
            <option value="Web Development">Web Development</option>
            <option value="Python Development">Python Development</option>
            <option value="Data Science">Data Science</option>
            <option value="Artificial Intelligence">
              Artificial Intelligence
            </option>
            <option value="UI/UX Design">UI/UX Design</option>
            <option value="Cloud Computing">Cloud Computing</option>
          </select>
        </div>

        <button type="submit">Register</button>
      </form>
    </div>
  </body>
</html>
