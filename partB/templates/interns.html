<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>View Interns</title>

    <style>
      .action-btn {
        border: none;
        padding: 8px 14px;
        border-radius: 6px;
        color: white;
        cursor: pointer;
        margin: 0 4px;
      }

      .edit-btn {
        background: #4f46e5;
      }

      .delete-btn {
        background: #ef4444;
      }

      .action-btn:hover {
        opacity: 0.9;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      }

      body {
        background: #f5f5f5;
        padding: 40px;
      }

      .container {
        max-width: 1000px;
        margin: auto;
        background: white;
        padding: 30px;
        border-radius: 15px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
      }

      h1 {
        text-align: center;
        margin-bottom: 25px;
        color: #333;
      }

      table {
        width: 100%;
        border-collapse: collapse;
      }

      th {
        background: #ff4fa0;
        color: white;
        padding: 12px;
      }

      td {
        padding: 12px;
        border-bottom: 1px solid #ddd;
        text-align: center;
      }

      tr:hover {
        background: #f9f9f9;
      }

      .loading {
        text-align: center;
        font-size: 18px;
      }
      .dashboard-btn {
        position: fixed;
        top: 20px;
        left: 20px;
        padding: 10px 20px;
        background: transparent;
        color: rgb(80, 79, 79);
        text-decoration: none;
        border-radius: 8px;
        font-weight: bold;
        z-index: 1000;
      }
      .dashboard-btn:hover {
        border-radius: 8px;
        font-size: large;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Registered Interns</h1>
      <a href="/dashboard" class="dashboard-btn"> ← Dashboard </a>
      <p class="loading" id="loading">Loading interns...</p>

      <table id="internTable" style="display: none">
        <thead>
          <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Email</th>
            <th>Domain</th>
            <th>Action</th>
          </tr>
        </thead>

        <tbody id="tableBody"></tbody>
      </table>
    </div>

    <script>
      async function deleteIntern(id) {
        const confirmDelete = confirm(
          `Are you sure you want to delete intern ${id}?`,
        );

        if (!confirmDelete) {
          return;
        }

        try {
          const response = await fetch(`/delete/${id}`, {
            method: "DELETE",
          });

          if (response.ok) {
            alert("Intern deleted successfully");
            location.reload();
          } else {
            alert("Failed to delete intern");
          }
        } catch (error) {
          console.error(error);
          alert("Something went wrong");
        }
      }
      function editIntern(id) {
        window.location.href = `/update_record/${id}`;
      }
      async function loadInterns() {
        try {
          const response = await fetch("/interns");
          const interns = await response.json();

          document.getElementById("loading").style.display = "none";
          document.getElementById("internTable").style.display = "table";

          const tableBody = document.getElementById("tableBody");

          interns.forEach((intern) => {
            const row = `
                <tr>
                    <td>${intern[0]}</td>
                    <td>${intern[1]}</td>
                    <td>${intern[2]}</td>
                    <td>${intern[3]}</td>
                    <td>
                        <button
                            class="action-btn edit-btn"
                            onclick="editIntern(${intern[0]})">
                            Edit
                        </button>

                        <button
                            class="action-btn delete-btn"
                            onclick="deleteIntern(${intern[0]})">
                            Delete
                        </button>
                    </td>
                </tr>
            `;
            tableBody.innerHTML += row;
          });
        } catch (error) {
          console.error(error);
          document.getElementById("loading").innerText =
            "Failed to load interns";
        }
      }

      loadInterns();
    </script>
  </body>
</html>
