<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Update Intern</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      }

      body {
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(135deg, #ff6b6b, #ff4fa0);
        padding: 20px;
      }

      .container {
        width: 100%;
        max-width: 550px;
        background: white;
        padding: 40px;
        border-radius: 20px;
        box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
      }

      h1 {
        text-align: center;
        color: #333;
        margin-bottom: 8px;
      }

      .subtitle {
        text-align: center;
        color: #777;
        margin-bottom: 30px;
      }

      .form-group {
        margin-bottom: 20px;
      }

      label {
        display: block;
        margin-bottom: 8px;
        font-weight: 600;
        color: #444;
      }

      input,
      select {
        width: 100%;
        padding: 12px;
        border: 1px solid #ddd;
        border-radius: 10px;
        font-size: 15px;
        transition: 0.3s;
      }

      input:focus,
      select:focus {
        outline: none;
        border-color: #ff4fa0;
        box-shadow: 0 0 8px rgba(255, 79, 160, 0.25);
      }

      .readonly {
        background: #f3f3f3;
        font-weight: bold;
        color: #444;
      }

      .btn {
        width: 100%;
        padding: 14px;
        border: none;
        border-radius: 10px;
        background: linear-gradient(135deg, #ff6b6b, #ff4fa0);
        color: white;
        font-size: 16px;
        font-weight: bold;
        cursor: pointer;
        transition: 0.3s;
      }

      .btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 20px rgba(255, 79, 160, 0.35);
      }

      .back {
        display: block;
        text-align: center;
        margin-top: 15px;
        text-decoration: none;
        color: #666;
      }

      .back:hover {
        color: #ff4fa0;
      }
      .dashboard-btn {
        position: fixed;
        top: 20px;
        left: 20px;
        padding: 10px 20px;
        background: transparent;
        color: white;
        text-decoration: none;
        border-radius: 8px;
        font-weight: bold;
        z-index: 1000;
      }
      .dashboard-btn:hover {
        border-radius: 8px;
        font-size: large;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Update Intern</h1>
      <p class="subtitle">Modify intern details</p>
      <a href="/dashboard" class="dashboard-btn"> ← Dashboard </a>
      <form id="updateForm" method="POST">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" id="name" name="name" required />
        </div>

        <div class="form-group">
          <label>Email Address</label>
          <input type="email" id="email" name="email" required />
        </div>

        <div class="form-group">
          <label>Internship Domain</label>
          <select id="domain" name="domain" required>
            <option>Web Development</option>
            <option>Python Development</option>
            <option>Data Science</option>
            <option>Artificial Intelligence</option>
            <option>UI/UX Design</option>
            <option>Cloud Computing</option>
          </select>
        </div>

        <button type="submit" class="btn">Update Record</button>
      </form>

      <a href="/view_interns" class="back"> ← Back to Intern List </a>
    </div>

    <script>
      const id = window.location.pathname.split("/").pop();

      document.getElementById("updateForm").action = `/update_record/${id}`;

      fetch(`/intern/${id}`)
        .then((res) => res.json())
        .then((data) => {
          document.getElementById("id").value = data[0];
          document.getElementById("name").value = data[1];
          document.getElementById("email").value = data[2];
          document.getElementById("domain").value = data[3];
        });
    </script>
  </body>
</html>
